<div class="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
  
  <!-- Left Sidebar (Dark Navy) -->
  <aside class="w-64 bg-[#0f172a] text-white flex flex-col flex-shrink-0 shadow-xl z-20">
    
    <!-- Branding Header -->
    <div class="h-20 border-b border-slate-800/80 flex items-center px-6">
      <!-- Logos placeholders (The user will drop the images in src/assets/images/) -->
      <img src="assets/images/inovalayer-circulada.png" alt="InovaLayer Icon" class="h-12 w-12 object-contain mr-3" onerror="this.style.display='none'">
      <h1 class="text-lg font-black tracking-widest text-white uppercase">INOVALAYER 3D</h1>
    </div>
    
    <div class="p-4 mt-2 flex-grow overflow-y-auto">
       <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4 block px-2">Menu do Cliente</span>
       
       <nav class="space-y-1">
         <!-- Active Link: Formulário -->
         <a routerLink="/orcamento/novo" routerLinkActive="bg-blue-600/20 text-blue-400 border border-blue-600/30 font-semibold" [routerLinkActiveOptions]="{exact: false}" class="flex items-center space-x-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors group">
            <i class="pi pi-plus text-lg group-hover:text-blue-400 transition-colors"></i>
            <span class="text-sm">Nova Solicitação</span>
         </a>
         
         <a href="#" class="flex items-center space-x-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors group">
            <i class="pi pi-file text-lg group-hover:text-amber-400 transition-colors"></i>
            <span class="text-sm">Meus Orçamentos</span>
         </a>
         
         <a href="#" class="flex items-center space-x-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors group">
            <i class="pi pi-cog text-lg group-hover:text-slate-300 transition-colors"></i>
            <span class="text-sm">Configurações</span>
         </a>
       </nav>
    </div>
    
    <!-- Sidebar Footer / User Profile -->
    <div class="p-4 border-t border-slate-800/80 bg-slate-900/50 flex flex-col items-center">
       <img src="assets/images/inovalayer-semfundo.png" alt="InovaLayer Logo" class="h-12 mb-4 object-contain opacity-50 hover:opacity-100 transition-opacity" onerror="this.style.display='none'">
       
       <div class="flex items-center w-full space-x-3">
         <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold text-white shadow-inner flex-shrink-0">C</div>
         <div class="overflow-hidden">
           <p class="text-xs font-bold text-white truncate">Cliente Logado</p>
           <p class="text-[10px] text-slate-500 truncate">Indústria Aeroespacial S.A.</p>
         </div>
       </div>
    </div>
  </aside>
  
  <!-- Main Content Area (Light Mode) -->
  <main class="flex-1 flex flex-col relative overflow-hidden bg-slate-50">
     <!-- Router Area -->
     <div class="flex-1 overflow-y-auto w-full relative">
        <router-outlet></router-outlet>
     </div>
  </main>

</div>
